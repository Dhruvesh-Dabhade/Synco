<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Background Slate -->
  <rect width="512" height="512" rx="128" fill="#0E0E0F"/>
  
  <!-- Outer Decorative Glowing Rings -->
  <circle cx="256" cy="256" r="210" fill="none" stroke="url(#glowingGrad)" stroke-width="2" opacity="0.15"/>
  <circle cx="256" cy="256" r="180" fill="none" stroke="url(#glowingGrad)" stroke-width="4" opacity="0.3"/>
  <circle cx="256" cy="256" r="150" fill="none" stroke="url(#glowingGrad)" stroke-width="1.5" opacity="0.5" stroke-dasharray="8 6"/>

  <!-- Audio Waveform Visualizers -->
  <g opacity="0.85">
    <rect x="136" y="226" width="8" height="60" rx="4" fill="#673AB7" />
    <rect x="156" y="196" width="8" height="120" rx="4" fill="#8E24AA" />
    <rect x="176" y="166" width="8" height="180" rx="4" fill="url(#glowingGrad)" />
    
    <rect x="328" y="166" width="8" height="180" rx="4" fill="url(#glowingGrad)" />
    <rect x="348" y="196" width="8" height="120" rx="4" fill="#8E24AA" />
    <rect x="368" y="226" width="8" height="60" rx="4" fill="#673AB7" />
  </g>

  <!-- Synchronization Sync Icons Center -->
  <g transform="translate(216, 216)">
    <!-- Rotating Arrows and Wave Circle -->
    <path d="M40 5 A35 35 0 1 0 75 40" fill="none" stroke="url(#glowingGrad)" stroke-width="8" stroke-linecap="round"/>
    <path d="M40 75 A35 35 0 1 0 5 40" fill="none" stroke="#673AB7" stroke-width="8" stroke-linecap="round"/>
    
    <!-- Arrows heads -->
    <polygon points="40,0 50,12 30,12" fill="#03A9F4"/>
    <polygon points="40,80 50,68 30,68" fill="#673AB7"/>
    
    <!-- Core central pulse -->
    <circle cx="40" cy="40" r="12" fill="#FFFFFF"/>
  </g>

  <!-- Definition of Radial and Linear Gradients -->
  <defs>
    <linearGradient id="glowingGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#03A9F4"/>
      <stop offset="50%" stop-color="#673AB7"/>
      <stop offset="100%" stop-color="#E040FB"/>
    </linearGradient>
  </defs>
</svg>
